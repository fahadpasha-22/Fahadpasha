<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fahad Pasha | Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Fahad Pasha</h1>
        <p>Full-Stack Developer</p>
    </header>

    <main class="container">
        <section class="glass-card">
            <h2>About Me</h2>
            <p>I am a beginner web developer learning modern web technologies.</p>
        </section>

        <section class="grid">
            <div class="glass-card">
                <h3>Skills</h3>
                <ul>
                    <li>HTML, CSS</li>
                    <li>JavaScript</li>
                    <li>Node.js (Learning)</li>
                </ul>
            </div>
            <div class="glass-card">
                <h3>Status</h3>
                <p>Building projects and learning full-stack development.</p>
            </div>
        </section>

        <section class="glass-card contact-zone">
            <h2>Contact Me</h2>
            <input type="text" id="msg" placeholder="Enter your message...">
            <button onclick="sendContactMessage()">Send</button>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
